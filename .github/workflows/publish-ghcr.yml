name: Publish GHCR Image

on:
  schedule:
    - cron: '17 * * * *'  # hourly, off-the-hour
  workflow_dispatch:
    inputs:
      tag:
        description: Tag to (re)build, e.g. v0.4.10. Leave empty to auto-detect.
        required: false
        type: string

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  UPSTREAM: matt1398/claude-devtools

concurrency:
  group: publish-ghcr
  cancel-in-progress: false

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.pick.outputs.tag }}
      image: ${{ steps.pick.outputs.image }}
    steps:
      - name: Pick next tag to build
        id: pick
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INPUT_TAG: ${{ inputs.tag }}
          REPO: ${{ github.repository }}
        run: |
          image="${REGISTRY}/${REPO,,}"
          echo "image=$image" >> "$GITHUB_OUTPUT"

          if [ -n "$INPUT_TAG" ]; then
            echo "tag=$INPUT_TAG" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          gh release list -R "$UPSTREAM" -L 50 \
            --json tagName,isPrerelease,isDraft \
            --jq '.[] | select(.isPrerelease==false and .isDraft==false) | .tagName' \
            | sort -u > upstream.txt

          # Package may not exist on first run -> 404 is fine, treat as empty
          gh api --paginate \
            "/users/${{ github.repository_owner }}/packages/container/claude-devtools/versions" \
            --jq '[.[].metadata.container.tags[]?] | unique | .[]' \
            2>/dev/null | sort -u > ghcr_raw.txt || : > ghcr_raw.txt
          awk '/^[0-9]+\.[0-9]+\.[0-9]+$/ {print "v"$0}' ghcr_raw.txt > ghcr.txt

          tag=$(comm -23 upstream.txt ghcr.txt | sort -V | head -1)
          echo "Picked: ${tag:-<none>}"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

  build:
    needs: detect
    if: needs.detect.outputs.tag != ''
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Prepare platform pair
        id: pp
        run: |
          platform="${{ matrix.platform }}"
          echo "pair=${platform//\//-}" >> "$GITHUB_OUTPUT"

      - name: Checkout upstream at tag
        uses: actions/checkout@v4
        with:
          repository: ${{ env.UPSTREAM }}
          ref: ${{ needs.detect.outputs.tag }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=${{ needs.detect.outputs.image }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ steps.pp.outputs.pair }}
          cache-to: type=gha,mode=max,scope=${{ steps.pp.outputs.pair }}

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ steps.pp.outputs.pair }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    needs: [detect, build]
    runs-on: ubuntu-latest
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ needs.detect.outputs.image }}
          tags: |
            type=semver,pattern={{version}},value=${{ needs.detect.outputs.tag }}
            type=semver,pattern={{major}}.{{minor}},value=${{ needs.detect.outputs.tag }}
            type=raw,value=latest

      - name: Create manifest list
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ needs.detect.outputs.image }}@sha256:%s ' *)

      - name: Inspect
        run: |
          docker buildx imagetools inspect \
            ${{ needs.detect.outputs.image }}:${{ steps.meta.outputs.version }}
